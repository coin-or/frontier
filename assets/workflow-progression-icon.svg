<title id="ttl">The Frontier decision workflow</title>
<desc id="dsc">The Frontier decision workflow in seven steps, each a glyph: Frame an empty grid, Score the grid filled in, Explore multi-scenario frontiers as dark points over light dominated points, Curate the dark pareto points with two robust picks ringed, Certify those two as emerald check-in-circle badges, Examine one certified point with a single ring, Decide one filled final pick.</desc>
