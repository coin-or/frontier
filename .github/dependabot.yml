# Dependabot: weekly version-update PRs so dependency bumps land deliberately
# (with a reviewable diff). Covers pyproject.toml floors (pip), ui/package-lock.json
# (npm), and workflow action versions (github-actions).
# NOTE: Dependabot does not track a standalone constraints.txt — after a pip bump
# lands, regenerate the lock with the uv command in that file's header.
version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: "/ui"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
