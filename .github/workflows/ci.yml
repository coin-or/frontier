name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only needs to read the repo. Override per-job if a step
# ever needs more (e.g. packages: write).
permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints.txt
      # -c constraints.txt pins the full resolved dependency tree (see the file
      # header for how to regenerate); pytest is dev-only and left unpinned.
      - run: pip install -c constraints.txt -e ".[sse,highs]" pytest
      - run: pytest tests/ --ignore=tests/ui -q

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npx tsc --noEmit
