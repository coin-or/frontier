name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only needs to read the repo. Override per-job if a step
# ever needs more (e.g. packages: write).
permissions:
  contents: read

# One live run per ref: a new push to a PR branch cancels the superseded run
# instead of stacking runners. Pushes to main still run to completion.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints.txt
      # -c constraints.txt pins the full resolved dependency tree (see the file
      # header for how to regenerate); pytest is dev-only and left unpinned.
      - run: pip install -c constraints.txt -e ".[sse,highs]" pytest pytest-xdist pytest-timeout
      # -n auto: the suite's tail is dozens of real solver runs (NSGA + HiGHS),
      # all against per-test temp stores, so it parallelizes cleanly.
      # --durations=10 keeps the slow tail visible in logs as the suite grows.
      # --timeout=300: the slowest test is ~16s under full parallel contention,
      # so 300s only fires on a genuine hang — which then fails loudly with the
      # test's name instead of silently eating the 6-hour job limit. The thread
      # method (a watchdog that dumps stacks and kills the worker) catches hangs
      # inside native solver code, where the default signal method never fires;
      # xdist replaces the killed worker and the run continues.
      - run: pytest tests/ --ignore=tests/ui -q -n auto --durations=10 --timeout=300 --timeout-method=thread

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npx tsc --noEmit
